name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun build cli.ts --compile --outfile vmx-linux-x64

      - name: Create checksums
        run: sha256sum vmx-linux-x64 > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vmx-linux-x64
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}